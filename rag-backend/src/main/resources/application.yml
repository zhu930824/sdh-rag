server:
  address: 0.0.0.0
  port: 8989


spring:
  application:
    name: rag-backend
  web:
    resources:
      add-mappings: false
  neo4j:
    uri: bolt://192.168.1.196:7687
    authentication:
      username: neo4j
      password: password
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  profiles:
    active: dev
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: sdh-rag-index
        dimensions: 1536
        similarity: cosine
  elasticsearch:
    uris: 192.168.1.196:9200
  datasource:
    username: root
    password: u876mhpd
    url: jdbc:mysql://192.168.1.196:3306/sdh_rag?serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true

  data:
    redis:
      host: 192.168.1.196
      port: 6379              # Redis 服务器端口，默认为 6379
#      password:               # Redis 密码，默认为空
      timeout: 5000ms         # 连接超时时间
      lettuce:
        pool:
          max-active: 8       # 最大连接数
          max-idle: 4         # 最大空闲连接数
          min-idle: 1         # 最小空闲连接数
          max-wait: 2000ms



xushu:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: xushu_jwt_secret_key_for_admin_access_256_bits_required
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: xushu_jwt_secret_key_for_user_access_256_bits_required
    user-ttl: 7200000
    user-token-name: token

# MinIO 配置
minio:
  endpoint: http://192.168.1.196:9000
  access-key: admin
  secret-key: password
  bucket-name: sdh-documents



logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: debug

knowledge:
  default:
    chunk-size: 500
    chunk-overlap: 50
    embeddingModel: text-embedding-v2
    rankModel: qwen3-rerank

# RAG Advisor 配置
rag:
  use-advisor: true  # true: 使用 Spring AI Advisor 机制; false: 使用原有手动 RAG 流程
  memory-window-size: 10  # 对话记忆窗口大小

# 记忆系统配置
memory:
  enabled: true
  working-window-size: 10
  working-memory-ttl-hours: 1
  semantic-similarity-threshold: 0.75
  semantic-dedup-threshold: 0.9
  pattern-min-observations: 3
  preference-importance-threshold: 5
  boundary-detection-window-size: 3
  summary-max-messages: 20
  decay-cron: "0 0 3 * * ?"
  memory-index-name: "sdh-memory-index"
  working-memory-key-prefix: "memory:working:"