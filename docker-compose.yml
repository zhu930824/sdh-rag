version: '3.8'

services:
  # 后端服务
  rag-backend:
    build:
      context: .
      dockerfile: rag-backend/Dockerfile
    container_name: sdh-rag-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-u876mhpd}
      - REDIS_HOST=${REDIS_HOST:-host.docker.internal}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ELASTICSEARCH_URI=${ELASTICSEARCH_URI:-http://host.docker.internal:9200}
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-d9e4ff14ddc1428ea34311e3423ee000}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET:-xushu_jwt_secret_key_for_admin_access_256_bits_required}
      - JWT_USER_SECRET=${JWT_USER_SECRET:-xushu_jwt_secret_key_for_user_access_256_bits_required}
    ports:
      - "${BACKEND_PORT:-8989}:8989"
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  rag-frontend:
    build:
      context: ./rag-frontend
      dockerfile: Dockerfile
    container_name: sdh-rag-frontend
    restart: unless-stopped
    depends_on:
      - rag-backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

# 数据卷定义
volumes:
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
